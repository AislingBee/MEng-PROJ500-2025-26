[env:nucleo_f429zi]
platform = ststm32
board = nucleo_f429zi
framework = stm32cube

; Upload via mass storage (drag-drop to NODE_F429ZI)
upload_protocol = mbed

; Build flags
build_flags =
    -DUSE_HAL_DRIVER
    -DSTM32F429xx
    -DHSE_VALUE=8000000U

; Monitor settings (for debugging)
monitor_speed = 921600
monitor_port = COM8
